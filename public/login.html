<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HorizonNet Lite - Ground Station Login</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="logo-area">
        <span class="logo-icon">📡</span>
        <h1>HorizonNet <span class="accent-text">Lite</span></h1>
        <p class="subtitle">Satellite Ground Station Dashboard</p>
      </div>

      <form id="loginForm">
        <div id="errorMessage" class="error-banner hidden"></div>
        
        <div class="input-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" required placeholder="Enter username" autofocus>
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required placeholder="Enter password">
        </div>

        <button type="submit" id="loginBtn" class="btn btn-primary">Sign In</button>
      </form>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorMsgEl = document.getElementById('errorMessage');
      const loginBtn = document.getElementById('loginBtn');

      errorMsgEl.classList.add('hidden');
      errorMsgEl.textContent = '';
      loginBtn.disabled = true;
      loginBtn.textContent = 'Authenticating...';

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (response.ok && data.success) {
          window.location.href = '/dashboard.html';
        } else {
          errorMsgEl.textContent = data.message || 'Invalid username or password.';
          errorMsgEl.classList.remove('hidden');
        }
      } catch (err) {
        errorMsgEl.textContent = 'A network error occurred. Please try again.';
        errorMsgEl.classList.remove('hidden');
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
