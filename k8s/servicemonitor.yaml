apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: horizonnet-monitor
  namespace: monitoring
  labels:
    release: monitoring 
spec:
  selector:
    matchLabels:
      app: horizonnet
  namespaceSelector:
    matchNames:
      - default
  endpoints:
    - port: http
      path: /metrics
      interval: 10s
